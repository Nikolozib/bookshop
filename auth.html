<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <i class="fa-solid fa-book-open-reader"></i> PageTurn
      </a>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      
      <div class="tab-panel active" id="login">
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" class="form-control" placeholder="JonDoe@gmail.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <div class="input-wrap">
              <input type="password" id="login-password" class="form-control" placeholder="Your password" required>
              <button type="button" class="toggle-password" data-target="login-password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="button" id="forgot-password" class="forgot-link">Forgot password?</button>
          <button type="submit" class="form-submit">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </button>
          <p id="login-msg" class="form-msg"></p>
        </form>
      </div>

      
      <div class="tab-panel" id="register">
        <form id="register-form">
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" class="form-control" placeholder="Jon Doe" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" class="form-control" placeholder="JonDoe@gmail.com" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <div class="input-wrap">
              <input type="password" id="reg-password" class="form-control" placeholder="Min. 6 characters" required>
              <button type="button" class="toggle-password" data-target="reg-password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirm Password</label>
            <div class="input-wrap">
              <input type="password" id="reg-confirm" class="form-control" placeholder="Repeat password" required>
              <button type="button" class="toggle-password" data-target="reg-confirm">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="form-submit">
            <i class="fa-solid fa-user-plus"></i> Create Account
          </button>
          <p id="register-msg" class="form-msg"></p>
        </form>
      </div>

      <p style="text-align:center;margin-top:24px;font-size:0.85rem;color:var(--text-light)">
        <a href="index.html" style="color:var(--rust);font-weight:700;cursor:pointer">
          <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
      </p>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
